syntax = "proto3";

package voiceplatform.v1;

import "common.proto";

option go_package = "github.com/yourorg/voiceplatform/proto/gen/go/voiceplatform/v1;voiceplatformv1";

// Deprecated: Control-plane upload APIs are no longer authoritative.
// Production clients MUST use the QUIC MediaService (see media.proto) for
// upload, metadata extraction, thumbnail handling, and quota reporting.

message CreateUploadRequest {
  option deprecated = true;
  string filename = 1;
  string mime_type = 2;
  uint64 size_bytes = 3;
  ChannelId channel_id = 4;
}

message CreateUploadResponse {
  option deprecated = true;
  AssetId asset_id = 1;
  string upload_url = 2;
  uint64 expires_in_seconds = 3;
  map<string, string> required_headers = 4;
}

message CompleteUploadRequest {
  option deprecated = true;
  AssetId asset_id = 1;
}

message CompleteUploadResponse {
  option deprecated = true;
  AssetId asset_id = 1;
  string download_url = 2;
  string thumbnail_url = 3;
  uint64 size_bytes = 4;
  string mime_type = 5;
  uint32 width = 6;
  uint32 height = 7;
  uint64 duration_ms = 8;
}

message GetQuotaRequest {
  option deprecated = true;
}

message GetQuotaResponse {
  option deprecated = true;
  uint64 used_bytes = 1;
  uint64 max_bytes = 2;
  uint32 file_count = 3;
  uint32 max_file_count = 4;
  uint64 max_single_file_bytes = 5;
}
